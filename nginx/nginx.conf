# ─────────────────────────────────────────────────────────────
#  Nginx — High-Performance Load Balancer for CodeRunner
#  Handles: upstream keepalive, health-check proxy, gzip,
#           request buffering, proper timeouts for long
#           compiler jobs (job.finished() blocks ~1-5s).
# ─────────────────────────────────────────────────────────────

# Use all available CPU cores
worker_processes auto;

# Per-worker file descriptor limit (must be ≥ worker_connections)
worker_rlimit_nofile 65535;

events {
    worker_connections  8192;       # was 1024 — supports 8k simultaneous connections
    use                 epoll;      # fastest event model on Linux
    multi_accept        on;         # accept all new connections at once
}

http {
    # ── WebSocket upgrade map ─────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ── Basic settings ──
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    server_tokens   off;            # hide Nginx version

    # ── Timeouts ──
    # Compiler jobs can legitimately take 5-30s; raise these accordingly
    keepalive_timeout           65;
    keepalive_requests         1000;
    client_header_timeout       15s;
    client_body_timeout         15s;
    send_timeout                60s;
    proxy_connect_timeout       10s;
    proxy_send_timeout          90s;   # time to send request to upstream
    proxy_read_timeout          90s;   # time to read response — covers job.finished()

    # ── Buffer optimisation ──
    client_max_body_size        4m;
    client_body_buffer_size    128k;
    proxy_buffer_size           16k;
    proxy_buffers              8 16k;
    proxy_busy_buffers_size     32k;
    large_client_header_buffers 4 16k;

    # ── Gzip compression ──
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   4;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml text/javascript;

    # ── Access log (combined + response time) ──
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time '
                    'uct=$upstream_connect_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ─────────────────────────────────────────────────────────
    #  Upstream: API Backend  (api1 + api2, each ×4 replicas)
    #  Docker Compose DNS round-robins within each service name
    #  so listing the bare service name reaches all replicas.
    #  We use least_conn for compiler workloads (unequal times).
    # ── Docker embedded DNS — allows nginx to re-resolve service names
    #    at runtime if a container restarts (not just at nginx startup)
    resolver 127.0.0.11 valid=10s ipv6=off;
    resolver_timeout 5s;

    # ─────────────────────────────────────────────────────────
    #  Upstream A: STATELESS routes — compiler + problems
    #  Both api1 and api2 handle these. Bull workers on Redis
    #  do the actual CPU work, so both APIs are thin forwarders.
    #  least_conn spreads 80 simultaneous submits evenly.
    # ─────────────────────────────────────────────────────────
    upstream stateless_api {
        least_conn;
        server api1:5000;
        server api2:5000;
        keepalive           64;
        keepalive_requests  1000;
        keepalive_timeout   60s;
    }

    # ─────────────────────────────────────────────────────────
    #  Upstream B: STATEFUL routes — game API + catch-all
    #  Game rooms and tournament state live in api1 memory.
    #  ALL WebSocket and /api/game/* must always hit api1.
    # ─────────────────────────────────────────────────────────
    upstream game_api {
        server api1:5000;
        keepalive           32;
        keepalive_requests  500;
        keepalive_timeout   60s;
    }

    # ─────────────────────────────────────────────────────────
    #  Upstream: WebSocket — STICKY to api1 only
    #  Game rooms live in-memory; all WS clients must hit the
    #  same process so they share the same GameManager state.
    # ─────────────────────────────────────────────────────────
    upstream ws_backend {
        server api1:5000;
        keepalive 32;
    }

    # ─────────────────────────────────────────────────────────
    #  Upstream: Frontend
    # ─────────────────────────────────────────────────────────
    upstream frontend {
        server frontend:80;
        keepalive 16;
    }

    # ─────────────────────────────────────────────────────────
    #  Rate limiting zone (shared across all workers)
    #  10 MB zone ≈ 160 000 unique IPs worth of state
    # ─────────────────────────────────────────────────────────
    # Rate limiting is handled at the application layer (Express + Redis)
    # so that it correctly keys per real user IP from X-Real-IP.
    # Nginx-level rate limiting removed to avoid double-throttling all traffic
    # coming from the single Docker host IP (172.19.0.1 → same bucket for all users).

    # ─────────────────────────────────────────────────────────
    #  Main server block
    # ─────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # ── Health check (any API instance) ─────────────────
        location /health {
            proxy_pass         http://stateless_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $http_x_real_ip;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            access_log off;
        }

        # ── WebSocket (game real-time) — always api1 ────────
        location /ws {
            proxy_pass         http://ws_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_read_timeout 86400s;
        }

        # ── Compiler routes → BOTH api1 + api2 (stateless) ──
        #    /run and /submit only enqueue a Bull job then wait.
        #    No in-memory state — safe to hit either instance.
        location /api/compiler {
            proxy_pass         http://stateless_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $http_x_real_ip;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_redirect     off;
            proxy_next_upstream error timeout http_503;
            proxy_next_upstream_tries 2;
        }

        # ── Problems routes → BOTH api1 + api2 (stateless) ───
        #    Pure DB reads, no process-local state.
        location /api/problems {
            proxy_pass         http://stateless_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $http_x_real_ip;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_redirect     off;
            proxy_next_upstream error timeout http_503;
            proxy_next_upstream_tries 2;
        }

        # ── Game + Tournament + all other API → api1 ONLY ───
        #    GameManager and tournament bracket live in api1 memory.
        #    Must never split across instances.
        location /api/ {
            proxy_pass         http://game_api;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $http_x_real_ip;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_redirect     off;
            proxy_next_upstream error timeout http_503;
            proxy_next_upstream_tries 2;
        }

        # ── Frontend ────────────────────────────────────────
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $http_x_real_ip;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Cache static assets at edge
            proxy_cache_valid  200 1m;
        }
    }
}
