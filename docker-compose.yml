services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coderunner
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no

  api1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - DB_HOST=pgbouncer
      - DB_PORT=5432
      - DB_NAME=coderunner
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - MAX_EXECUTION_TIME=3000
      - MAX_MEMORY_MB=256
      - JOB_WAIT_TIMEOUT_MS=35000
    tmpfs:
      - /app/temp:size=128m,mode=1777
    depends_on:
      pgbouncer:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── Second API instance: handles compiler + problems routes
  #    Game WebSocket stays on api1 (in-memory GameManager).
  #    Nginx routes /api/compiler/* and /api/problems/* to both.
  api2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - DB_HOST=pgbouncer
      - DB_PORT=5432
      - DB_NAME=coderunner
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - MAX_EXECUTION_TIME=3000
      - MAX_MEMORY_MB=256
      - JOB_WAIT_TIMEOUT_MS=35000
      - INSTANCE_ID=api2
    tmpfs:
      - /app/temp:size=128m,mode=1777
    depends_on:
      pgbouncer:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  load_balancer:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: npm run worker
    environment:
      - NODE_ENV=production
      - DB_HOST=pgbouncer
      - DB_PORT=5432
      - DB_NAME=coderunner
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - WORKER_CONCURRENCY=20
      - SUBMIT_CONCURRENCY=12
      - TC_CONCURRENCY=16
      - MAX_EXECUTION_TIME=3000
      - MAX_MEMORY_MB=256
      - NODE_OPTIONS=--max-old-space-size=1024
      - BIN_CACHE_MAX=150
    tmpfs:
      # Source writes and test I/O live in RAM — fast, auto-cleared on restart.
      # exec is required so the shell can run binaries produced by g++ here.
      - /app/temp:size=512m,mode=1777,exec
    depends_on:
      pgbouncer:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    deploy:
      replicas: 3

  pgbouncer:
    image: edoburu/pgbouncer
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 2000
      DEFAULT_POOL_SIZE: 200
    ports:
      - "5434:5432"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@codearena.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      - db

volumes:
  postgres_data:
  pgadmin_data:
