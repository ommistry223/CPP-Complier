## ══════════════════════════════════════════════════════════════════
##  PC-1 Main Server — docker-compose.yml
##
##  This file runs ONLY on PC-1 (Main Server).
##  Worker nodes (PC-2, PC-3) use worker-node/docker-compose.worker.yml.
##
##  Changes from the single-machine setup:
##    1. Redis now listens on 0.0.0.0 so PC-2/PC-3 can reach it.
##    2. Redis password added (REDIS_PASSWORD env var required in .env).
##    3. PgBouncer port exposed to LAN for worker DB access.
##    4. The local "worker" service has been REMOVED — workers run on
##       PC-2 and PC-3 via docker-compose.worker.yml.
## ══════════════════════════════════════════════════════════════════

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coderunner
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    env_file:
      - ./backend/.env
    ports:
      # Bind to all interfaces so PC-2 and PC-3 can connect over LAN.
      # Restrict at the firewall level (only allow LAN subnet).
      - "0.0.0.0:6380:6379"
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
      --requirepass ${REDIS_PASSWORD}
      --bind 0.0.0.0
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - DB_HOST=pgbouncer
      - DB_PORT=5432
      - DB_NAME=coderunner
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MAX_EXECUTION_TIME=3000
      - MAX_MEMORY_MB=256
      - JOB_WAIT_TIMEOUT_MS=35000
    tmpfs:
      - /app/temp:size=128m,mode=1777
    depends_on:
      pgbouncer:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  # ── Second API instance: handles compiler + problems routes
  #    Game WebSocket stays on api1 (in-memory GameManager).
  #    Nginx routes /api/compiler/* and /api/problems/* to both.
  api2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - DB_HOST=pgbouncer
      - DB_PORT=5432
      - DB_NAME=coderunner
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MAX_EXECUTION_TIME=3000
      - MAX_MEMORY_MB=256
      - JOB_WAIT_TIMEOUT_MS=35000
      - INSTANCE_ID=api2
    tmpfs:
      - /app/temp:size=128m,mode=1777
    depends_on:
      pgbouncer:
        condition: service_started
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5000/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  load_balancer:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:80"
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
      frontend:
        condition: service_started
    restart: unless-stopped

  # ── NOTE: The "worker" service has been intentionally removed. ──
  # Workers now run on PC-2 and PC-3 via worker-node/docker-compose.worker.yml.
  # This eliminates CPU competition between the API and compiler workloads.
  # To fall back to local workers (emergency), uncomment the block below:
  #
  # worker:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   command: npm run worker
  #   environment:
  #     - NODE_ENV=production
  #     - DB_HOST=pgbouncer
  #     - DB_PORT=5432
  #     - DB_NAME=coderunner
  #     - DB_USER=postgres
  #     - DB_PASSWORD=postgres
  #     - REDIS_HOST=redis
  #     - REDIS_PORT=6379
  #     - REDIS_PASSWORD=${REDIS_PASSWORD}
  #     - WORKER_CONCURRENCY=8
  #     - SUBMIT_CONCURRENCY=4
  #     - TC_CONCURRENCY=8
  #     - MAX_EXECUTION_TIME=3000
  #     - MAX_MEMORY_MB=256
  #     - NODE_OPTIONS=--max-old-space-size=1024
  #     - BIN_CACHE_MAX=150
  #   tmpfs:
  #     - /app/temp:size=512m,mode=1777,exec
  #   depends_on:
  #     pgbouncer:
  #       condition: service_started
  #     db:
  #       condition: service_healthy
  #     redis:
  #       condition: service_healthy
  #   restart: unless-stopped

  pgbouncer:
    image: edoburu/pgbouncer
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 2000
      DEFAULT_POOL_SIZE: 200
    ports:
      # Expose PgBouncer to LAN so workers on PC-2/PC-3 can fetch test cases.
      - "0.0.0.0:5434:5432"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@codearena.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
      PGADMIN_SERVER_JSON_FILE: /pgadmin4/servers.json
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
    depends_on:
      - db

volumes:
  postgres_data:
  pgadmin_data:
